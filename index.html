<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown → PDF</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked-gfm-heading-id/lib/index.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/common.min.js"></script>
<link id="hljs-theme" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
<style>
  :root {
    --bg: #f6f7f9;
    --panel: #ffffff;
    --border: #e4e6eb;
    --text: #1f2328;
    --muted: #6b7280;
    --accent: #2563eb;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* ---- Toolbar ---- */
  header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header .spacer { flex: 1; }
  .ctrl { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); }
  select, button {
    font: inherit; font-size: 13px;
    border: 1px solid var(--border);
    background: #fff; color: var(--text);
    border-radius: 6px; padding: 6px 10px; cursor: pointer;
  }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  button:hover { filter: brightness(0.97); }
  label.file { display: inline-flex; }
  input[type=file] { display: none; }

  /* ---- Editor / Preview split ---- */
  main { flex: 1; display: flex; min-height: 0; }
  .pane { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .pane + .pane { border-left: 1px solid var(--border); }
  .pane-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
    color: var(--muted); padding: 6px 16px; background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  #editor {
    flex: 1; width: 100%; border: 0; resize: none; outline: none;
    padding: 16px; font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 14px; line-height: 1.6; color: var(--text);
  }
  #preview-wrap { flex: 1; overflow: auto; background: #fff; }

  /* drag-over highlight */
  body.dragover #editor { background: #eef4ff; }

  /* ---- Rendered markdown ('paper') ---- */
  .paper {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 56px;
    line-height: 1.7;
    font-size: 15.5px;
  }
  .paper h1, .paper h2, .paper h3, .paper h4 { line-height: 1.3; margin: 1.6em 0 .6em; font-weight: 600; }
  .paper h1 { font-size: 1.9em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
  .paper h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
  .paper h3 { font-size: 1.25em; }
  .paper p, .paper ul, .paper ol, .paper blockquote, .paper table { margin: 0 0 1em; }
  .paper code {
    font-family: "SF Mono", Menlo, Consolas, monospace; font-size: .88em;
    background: #f0f1f3; padding: .15em .4em; border-radius: 4px;
  }
  .paper pre { background: #f6f8fa; padding: 14px 16px; border-radius: 8px; overflow: auto; }
  .paper pre code { background: none; padding: 0; }
  .paper blockquote { border-left: 4px solid var(--border); padding-left: 1em; color: var(--muted); }
  .paper table { border-collapse: collapse; width: 100%; }
  .paper th, .paper td { border: 1px solid var(--border); padding: 6px 12px; text-align: left; }
  .paper th { background: #f6f8fa; }
  .paper img { max-width: 100%; }
  .paper a { color: var(--accent); }
  .paper hr { border: 0; border-top: 1px solid var(--border); margin: 2em 0; }

  /* serif option */
  .paper.serif { font-family: Georgia, "Songti SC", "SimSun", serif; }

  /* ---- Print: only the paper, sized to the page ---- */
  @media print {
    @page { margin: var(--page-margin, 18mm); }
    header, main > .pane:first-child, .pane-label { display: none !important; }
    body, main, .pane, #preview-wrap { display: block !important; overflow: visible !important; height: auto !important; }
    .pane + .pane { border: 0; }
    .paper { max-width: none; margin: 0; padding: 0; font-size: 11.5pt; }
    .paper pre, .paper blockquote, .paper table, .paper img { break-inside: avoid; }
    .paper h1, .paper h2, .paper h3 { break-after: avoid; }
    a { color: inherit; text-decoration: none; }
  }
</style>
</head>
<body>
<header>
  <h1>Markdown → PDF</h1>
  <div class="ctrl">
    <label class="file">
      <button type="button" onclick="this.parentNode.querySelector('input').click()">打开 .md</button>
      <input type="file" accept=".md,.markdown,.txt,text/markdown" onchange="loadFile(this.files[0])">
    </label>
  </div>
  <div class="spacer"></div>
  <div class="ctrl">字体
    <select id="font" onchange="applyOpts()">
      <option value="">无衬线(默认)</option>
      <option value="serif">衬线 / 宋体</option>
    </select>
  </div>
  <div class="ctrl">页边距
    <select id="margin" onchange="applyOpts()">
      <option value="12mm">窄</option>
      <option value="18mm" selected>标准</option>
      <option value="25mm">宽</option>
    </select>
  </div>
  <div class="ctrl">代码主题
    <select id="hljs" onchange="setHljs(this.value)">
      <option value="github">浅色</option>
      <option value="github-dark">深色</option>
    </select>
  </div>
  <button class="primary" onclick="window.print()">导出 PDF</button>
</header>

<main>
  <div class="pane">
    <div class="pane-label">Markdown 源</div>
    <textarea id="editor" spellcheck="false" placeholder="把 .md 文件拖到这里,或直接粘贴 Markdown…"></textarea>
  </div>
  <div class="pane">
    <div class="pane-label">预览(导出时按此排版)</div>
    <div id="preview-wrap"><div class="paper" id="preview"></div></div>
  </div>
</main>

<script>
  marked.use(markedGfmHeadingId.gfmHeadingId());
  marked.setOptions({
    gfm: true, breaks: false,
    highlight: (code, lang) => {
      try {
        return lang && hljs.getLanguage(lang)
          ? hljs.highlight(code, { language: lang }).value
          : hljs.highlightAuto(code).value;
      } catch (e) { return code; }
    }
  });

  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');

  function render() { preview.innerHTML = marked.parse(editor.value || ''); }
  function applyOpts() {
    preview.classList.toggle('serif', document.getElementById('font').value === 'serif');
    document.documentElement.style.setProperty('--page-margin', document.getElementById('margin').value);
  }
  function setHljs(name) {
    document.getElementById('hljs-theme').href =
      `https://cdn.jsdelivr.net/npm/highlight.js@11/styles/${name}.min.css`;
  }
  function loadFile(file) {
    if (!file) return;
    const r = new FileReader();
    r.onload = () => { editor.value = r.result; render(); };
    r.readAsText(file);
  }

  editor.addEventListener('input', render);

  // drag & drop a file anywhere
  ['dragenter','dragover'].forEach(e => document.body.addEventListener(e, ev => {
    ev.preventDefault(); document.body.classList.add('dragover');
  }));
  ['dragleave','drop'].forEach(e => document.body.addEventListener(e, ev => {
    ev.preventDefault(); if (e === 'drop' || ev.target === document.body) document.body.classList.remove('dragover');
  }));
  document.body.addEventListener('drop', ev => {
    const f = ev.dataTransfer.files[0];
    if (f) loadFile(f);
  });

  // demo content
  editor.value = `# Markdown → PDF

把左边的内容替换成你的，右边实时预览，点 **导出 PDF** 即可。

## 支持

- GitHub 风格 Markdown（表格、任务列表、删除线）
- 代码高亮
- 中文字体清晰、文字可选中（矢量，非截图）

\`\`\`python
def hello(name):
    return f"你好, {name}"
\`\`\`

| 功能 | 状态 |
|------|------|
| 拖拽打开 | ✅ |
| 实时预览 | ✅ |
| 一键导出 | ✅ |

> 导出时：在打印对话框里选「另存为 PDF」，关闭「页眉和页脚」即可得到干净的 PDF。
`;
  applyOpts();
  render();
</script>
</body>
</html>
