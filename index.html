<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown → PDF</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked-gfm-heading-id/lib/index.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/common.min.js"></script>
<link id="hljs-theme" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
<!-- math -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>
<!-- diagrams -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
  :root {
    --bg: #f6f7f9;
    --panel: #ffffff;
    --border: #e4e6eb;
    --text: #1f2328;
    --muted: #6b7280;
    --accent: #2563eb;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* ---- Toolbar ---- */
  header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header .spacer { flex: 1; }
  .ctrl { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); }
  select, button {
    font: inherit; font-size: 13px;
    border: 1px solid var(--border);
    background: #fff; color: var(--text);
    border-radius: 6px; padding: 6px 10px; cursor: pointer;
  }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  button:hover { filter: brightness(0.97); }
  input[type=file] { display: none; }
  input[type=text] {
    font: inherit; font-size: 13px; border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; color: var(--text);
  }

  /* ---- cover settings row ---- */
  #cover-bar {
    flex: 0 0 auto; display: none; gap: 10px; align-items: center; flex-wrap: wrap;
    padding: 8px 16px; background: #fafbfc; border-bottom: 1px solid var(--border);
  }
  #cover-bar.show { display: flex; }
  #cover-bar input[type=text] { flex: 1; min-width: 140px; }

  /* ---- Editor / Preview split ---- */
  main { flex: 1; display: flex; min-height: 0; }
  .pane { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .pane + .pane { border-left: 1px solid var(--border); }
  .pane-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
    color: var(--muted); padding: 6px 16px; background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  #editor {
    flex: 1; width: 100%; border: 0; resize: none; outline: none;
    padding: 16px; font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 14px; line-height: 1.6; color: var(--text);
  }
  #preview-wrap { flex: 1; overflow: auto; background: #fff; }

  body.dragover #editor { background: #eef4ff; }

  /* ---- cover page ---- */
  #cover {
    display: none; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; min-height: 70vh; padding: 48px 56px; max-width: 760px; margin: 0 auto;
  }
  #cover.show { display: flex; }
  #cover .c-title { font-size: 2.4em; font-weight: 700; line-height: 1.2; margin-bottom: .4em; }
  #cover .c-author { font-size: 1.2em; color: var(--muted); margin-bottom: .2em; }
  #cover .c-date { font-size: 1em; color: var(--muted); }

  /* ---- Rendered markdown ('paper') ---- */
  .paper {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 56px;
    line-height: 1.7;
    font-size: 15.5px;
  }
  .paper h1, .paper h2, .paper h3, .paper h4 { line-height: 1.3; margin: 1.6em 0 .6em; font-weight: 600; }
  .paper h1 { font-size: 1.9em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
  .paper h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
  .paper h3 { font-size: 1.25em; }
  .paper p, .paper ul, .paper ol, .paper blockquote, .paper table { margin: 0 0 1em; }
  .paper code {
    font-family: "SF Mono", Menlo, Consolas, monospace; font-size: .88em;
    background: #f0f1f3; padding: .15em .4em; border-radius: 4px;
  }
  .paper pre { background: #f6f8fa; padding: 14px 16px; border-radius: 8px; overflow: auto; }
  .paper pre code { background: none; padding: 0; }
  .paper blockquote { border-left: 4px solid var(--border); padding-left: 1em; color: var(--muted); }
  .paper table { border-collapse: collapse; width: 100%; }
  .paper th, .paper td { border: 1px solid var(--border); padding: 6px 12px; text-align: left; }
  .paper th { background: #f6f8fa; }
  .paper img { max-width: 100%; }
  .paper a { color: var(--accent); }
  .paper hr { border: 0; border-top: 1px solid var(--border); margin: 2em 0; }
  .paper .mermaid { text-align: center; margin: 1em 0; }

  .paper.serif { font-family: Georgia, "Songti SC", "SimSun", serif; }

  /* ---- Print ---- */
  @media print {
    @page { margin: var(--page-margin, 18mm); }
    header, #cover-bar, main > .pane:first-child, .pane-label { display: none !important; }
    body, main, .pane, #preview-wrap { display: block !important; overflow: visible !important; height: auto !important; }
    .pane + .pane { border: 0; }
    .paper { max-width: none; margin: 0; padding: 0; font-size: 11.5pt; }
    #cover.show { display: flex !important; min-height: 92vh; break-after: page; max-width: none; padding: 0; }
    .paper pre, .paper blockquote, .paper table, .paper img, .paper .mermaid { break-inside: avoid; }
    .paper h1, .paper h2, .paper h3 { break-after: avoid; }
    a { color: inherit; text-decoration: none; }
  }
</style>
</head>
<body>
<header>
  <h1>Markdown → PDF</h1>
  <div class="ctrl">
    <button type="button" onclick="document.getElementById('fileInput').click()">打开 .md</button>
    <input id="fileInput" type="file" accept=".md,.markdown,.txt,text/markdown" onchange="loadFile(this.files[0])">
  </div>
  <div class="spacer"></div>
  <label class="ctrl"><input type="checkbox" id="coverToggle" onchange="toggleCover()"> 封面页</label>
  <div class="ctrl">字体
    <select id="font" onchange="applyOpts()">
      <option value="">无衬线(默认)</option>
      <option value="serif">衬线 / 宋体</option>
    </select>
  </div>
  <div class="ctrl">页边距
    <select id="margin" onchange="applyOpts()">
      <option value="12mm">窄</option>
      <option value="18mm" selected>标准</option>
      <option value="25mm">宽</option>
    </select>
  </div>
  <div class="ctrl">代码主题
    <select id="hljs" onchange="setHljs(this.value)">
      <option value="github">浅色</option>
      <option value="github-dark">深色</option>
    </select>
  </div>
  <button class="primary" onclick="window.print()">导出 PDF</button>
</header>

<div id="cover-bar">
  <input type="text" id="cTitle"  placeholder="标题"   oninput="render()">
  <input type="text" id="cAuthor" placeholder="作者"   oninput="render()">
  <input type="text" id="cDate"   placeholder="日期 / 副标题" oninput="render()">
</div>

<main>
  <div class="pane">
    <div class="pane-label">Markdown 源</div>
    <textarea id="editor" spellcheck="false" placeholder="把 .md 文件拖到这里,或直接粘贴 Markdown…"></textarea>
  </div>
  <div class="pane">
    <div class="pane-label">预览(导出时按此排版)</div>
    <div id="preview-wrap">
      <div id="cover"><div class="c-title"></div><div class="c-author"></div><div class="c-date"></div></div>
      <div class="paper" id="preview"></div>
    </div>
  </div>
</main>

<script>
  // marked plugins
  marked.use(markedGfmHeadingId.gfmHeadingId());
  if (window.markedKatex) marked.use(markedKatex({ throwOnError: false, nonStandard: true }));
  marked.setOptions({
    gfm: true, breaks: false,
    highlight: (code, lang) => {
      if (lang === 'mermaid') return code;           // leave for mermaid pass
      try {
        return lang && hljs.getLanguage(lang)
          ? hljs.highlight(code, { language: lang }).value
          : hljs.highlightAuto(code).value;
      } catch (e) { return code; }
    }
  });
  mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });

  const editor  = document.getElementById('editor');
  const preview = document.getElementById('preview');
  const cover   = document.getElementById('cover');
  let mermaidSeq = 0;

  function render() {
    let html = marked.parse(editor.value || '');
    // turn ```mermaid blocks into <div class="mermaid">
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    tmp.querySelectorAll('pre > code.language-mermaid').forEach(code => {
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = code.textContent;
      code.parentElement.replaceWith(div);
    });
    preview.innerHTML = tmp.innerHTML;
    const nodes = preview.querySelectorAll('.mermaid');
    if (nodes.length) {
      nodes.forEach(n => n.removeAttribute('data-processed'));
      try { mermaid.run({ nodes, suppressErrors: true }); } catch (e) {}
    }
    // cover
    cover.querySelector('.c-title').textContent  = document.getElementById('cTitle').value;
    cover.querySelector('.c-author').textContent = document.getElementById('cAuthor').value;
    cover.querySelector('.c-date').textContent   = document.getElementById('cDate').value;
  }

  function toggleCover() {
    const on = document.getElementById('coverToggle').checked;
    document.getElementById('cover-bar').classList.toggle('show', on);
    cover.classList.toggle('show', on);
  }
  function applyOpts() {
    preview.classList.toggle('serif', document.getElementById('font').value === 'serif');
    document.documentElement.style.setProperty('--page-margin', document.getElementById('margin').value);
  }
  function setHljs(name) {
    document.getElementById('hljs-theme').href =
      `https://cdn.jsdelivr.net/npm/highlight.js@11/styles/${name}.min.css`;
  }
  function loadFile(file) {
    if (!file) return;
    const r = new FileReader();
    r.onload = () => { editor.value = r.result; render(); };
    r.readAsText(file);
  }

  editor.addEventListener('input', render);

  ['dragenter','dragover'].forEach(e => document.body.addEventListener(e, ev => {
    ev.preventDefault(); document.body.classList.add('dragover');
  }));
  ['dragleave','drop'].forEach(e => document.body.addEventListener(e, ev => {
    ev.preventDefault(); if (e === 'drop' || ev.target === document.body) document.body.classList.remove('dragover');
  }));
  document.body.addEventListener('drop', ev => {
    const f = ev.dataTransfer.files[0];
    if (f) loadFile(f);
  });

  // demo content
  editor.value = `# Markdown → PDF

实时预览,点 **导出 PDF**。新增:数学公式、流程图、封面页。

## 数学公式 (KaTeX)

行内 $E = mc^2$,块级:

$$\\int_0^\\infty e^{-x^2}\\,dx = \\frac{\\sqrt{\\pi}}{2}$$

## 流程图 (Mermaid)

\`\`\`mermaid
flowchart LR
  A[写 Markdown] --> B{预览}
  B --> C[导出 PDF]
\`\`\`

## 代码

\`\`\`python
def hello(name):
    return f"你好, {name}"
\`\`\`

> 勾选右上角「封面页」可加标题页。导出时在打印对话框选「另存为 PDF」,需要页码就开启「页眉和页脚」。
`;
  applyOpts();
  render();
</script>
</body>
</html>
